<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YBX Assistant — Yellow Box Markets</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --ybx-yellow: #FFD700;
      --ybx-dark: #1a1a2e;
      --ybx-darker: #16213e;
      --ybx-accent: #0f3460;
      --ybx-text: #e0e0e0;
      --ybx-text-dim: #8a8a9a;
      --ybx-green: #00c853;
      --ybx-red: #ff1744;
      --ybx-user-bg: #2a2a4a;
      --ybx-bot-bg: #1e1e3a;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--ybx-dark);
      color: var(--ybx-text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      background: var(--ybx-darker);
      border-bottom: 2px solid var(--ybx-yellow);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .header-logo {
      width: 40px;
      height: 40px;
      background: var(--ybx-yellow);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 18px;
      color: var(--ybx-dark);
    }

    .header-info h1 {
      font-size: 16px;
      color: var(--ybx-yellow);
    }

    .header-info p {
      font-size: 11px;
      color: var(--ybx-text-dim);
    }

    .header-actions {
      margin-left: auto;
      display: flex;
      gap: 8px;
    }

    .header-btn {
      background: var(--ybx-accent);
      color: var(--ybx-text);
      border: 1px solid rgba(255,215,0,0.2);
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .header-btn:hover {
      background: var(--ybx-yellow);
      color: var(--ybx-dark);
    }

    /* Quick Actions */
    .quick-actions {
      background: var(--ybx-darker);
      padding: 8px 16px;
      display: flex;
      gap: 6px;
      overflow-x: auto;
      flex-shrink: 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .quick-btn {
      background: rgba(255,215,0,0.1);
      color: var(--ybx-yellow);
      border: 1px solid rgba(255,215,0,0.2);
      padding: 5px 12px;
      border-radius: 16px;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }

    .quick-btn:hover {
      background: var(--ybx-yellow);
      color: var(--ybx-dark);
    }

    /* Chat Area */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-wrap: break-word;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      background: var(--ybx-user-bg);
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .message.bot {
      background: var(--ybx-bot-bg);
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      border-left: 3px solid var(--ybx-yellow);
    }

    .message.bot .bot-label {
      font-size: 10px;
      color: var(--ybx-yellow);
      margin-bottom: 4px;
      font-weight: 600;
    }

    .message.typing {
      background: var(--ybx-bot-bg);
      border-left: 3px solid var(--ybx-yellow);
      align-self: flex-start;
    }

    .typing-dots {
      display: flex;
      gap: 4px;
      padding: 4px 0;
    }

    .typing-dots span {
      width: 8px;
      height: 8px;
      background: var(--ybx-yellow);
      border-radius: 50%;
      animation: bounce 1.4s infinite;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    /* Input Area */
    .input-area {
      background: var(--ybx-darker);
      border-top: 1px solid rgba(255,255,255,0.05);
      padding: 12px 16px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    .input-area textarea {
      flex: 1;
      background: var(--ybx-accent);
      color: var(--ybx-text);
      border: 1px solid rgba(255,215,0,0.15);
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      min-height: 42px;
      max-height: 120px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-area textarea:focus {
      border-color: var(--ybx-yellow);
    }

    .input-area textarea::placeholder {
      color: var(--ybx-text-dim);
    }

    .send-btn {
      background: var(--ybx-yellow);
      color: var(--ybx-dark);
      border: none;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .send-btn:hover { transform: scale(1.1); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* Welcome */
    .welcome {
      text-align: center;
      padding: 40px 20px;
      color: var(--ybx-text-dim);
    }

    .welcome h2 {
      color: var(--ybx-yellow);
      font-size: 20px;
      margin-bottom: 8px;
    }

    .welcome p {
      font-size: 13px;
      line-height: 1.8;
    }

    /* Status */
    .status-bar {
      background: var(--ybx-darker);
      padding: 4px 16px;
      font-size: 10px;
      color: var(--ybx-text-dim);
      text-align: center;
      flex-shrink: 0;
    }

    .status-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      margin-right: 4px;
    }

    .status-dot.online { background: var(--ybx-green); }
    .status-dot.offline { background: var(--ybx-red); }

    /* Mobile */
    @media (max-width: 600px) {
      .header-actions { display: none; }
      .message { max-width: 92%; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-logo">YBX</div>
    <div class="header-info">
      <h1>YBX Assistant</h1>
      <p>Yellow Box Markets — ENGULF-X AI Trading</p>
    </div>
    <div class="header-actions">
      <button class="header-btn" onclick="resetChat()">🔄 Reset</button>
    </div>
  </div>

  <!-- Quick Actions -->
  <div class="quick-actions">
    <button class="quick-btn" onclick="sendQuick('วิเคราะห์ XAUUSD ให้หน่อย')">📊 วิเคราะห์ทอง</button>
    <button class="quick-btn" onclick="sendQuick('เช็คลิสต์ 5 ขั้นตอน ENGULF-X คืออะไร?')">📋 เช็คลิสต์</button>
    <button class="quick-btn" onclick="sendQuick('อธิบาย MAJOR vs MINOR Structure')">🔍 MAJOR/MINOR</button>
    <button class="quick-btn" onclick="sendQuick('Zone Priority มีอะไรบ้าง?')">⭐ Zone Priority</button>
    <button class="quick-btn" onclick="sendQuick('กฎ 1%/2% อัตโนมัติคืออะไร?')">⚡ กฎ 1%/2%</button>
    <button class="quick-btn" onclick="sendQuick('KF (ข้ามฟาก) คืออะไร?')">🔀 KF Zone</button>
    <button class="quick-btn" onclick="sendQuick('วิธีเปิดบัญชี Yellow Box Markets')">🏦 เปิดบัญชี</button>
  </div>

  <!-- Chat Area -->
  <div class="chat-area" id="chatArea">
    <div class="welcome">
      <h2>🟡 ยินดีต้อนรับสู่ YBX Assistant</h2>
      <p>
        ผมคือผู้ช่วย AI ของ Yellow Box Markets<br>
        เชี่ยวชาญด้านกลยุทธ์ ENGULF-X<br><br>
        📊 วิเคราะห์ตลาด &nbsp;|&nbsp; 📚 สอนกลยุทธ์ &nbsp;|&nbsp; 💬 สนับสนุนลูกค้า<br><br>
        พิมพ์ข้อความหรือกดปุ่มด้านบนเพื่อเริ่มต้น!
      </p>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <textarea id="messageInput" placeholder="พิมพ์ข้อความ..." rows="1"
      onkeydown="handleKeydown(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">▶</button>
  </div>

  <!-- Status -->
  <div class="status-bar">
    <span class="status-dot" id="statusDot"></span>
    <span id="statusText">Connecting...</span>
  </div>

  <script>
    const API_URL = '/api/chat';
    const RESET_URL = '/api/reset';
    const userId = 'web_' + Math.random().toString(36).substring(2, 10);
    let isLoading = false;

    // Check health
    async function checkHealth() {
      try {
        const res = await fetch('/api/health');
        if (res.ok) {
          document.getElementById('statusDot').className = 'status-dot online';
          document.getElementById('statusText').textContent = 'Online — ENGULF-X AI Ready';
        }
      } catch {
        document.getElementById('statusDot').className = 'status-dot offline';
        document.getElementById('statusText').textContent = 'Offline — Server not running';
      }
    }
    checkHealth();
    setInterval(checkHealth, 30000);

    function addMessage(text, sender) {
      const chatArea = document.getElementById('chatArea');
      // Remove welcome
      const welcome = chatArea.querySelector('.welcome');
      if (welcome) welcome.remove();

      const msg = document.createElement('div');
      msg.className = `message ${sender}`;

      if (sender === 'bot') {
        msg.innerHTML = `<div class="bot-label">YBX Assistant</div>${escapeHtml(text)}`;
      } else {
        msg.textContent = text;
      }

      chatArea.appendChild(msg);
      chatArea.scrollTop = chatArea.scrollHeight;
      return msg;
    }

    function showTyping() {
      const chatArea = document.getElementById('chatArea');
      const typing = document.createElement('div');
      typing.className = 'message typing';
      typing.id = 'typingIndicator';
      typing.innerHTML = `
        <div class="bot-label">YBX Assistant</div>
        <div class="typing-dots"><span></span><span></span><span></span></div>
      `;
      chatArea.appendChild(typing);
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    function hideTyping() {
      const el = document.getElementById('typingIndicator');
      if (el) el.remove();
    }

    function escapeHtml(text) {
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/\n/g, '<br>');
    }

    async function sendMessage() {
      const input = document.getElementById('messageInput');
      const text = input.value.trim();
      if (!text || isLoading) return;

      isLoading = true;
      document.getElementById('sendBtn').disabled = true;
      input.value = '';
      input.style.height = '42px';

      addMessage(text, 'user');
      showTyping();

      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, userId, userName: 'Web User' }),
        });

        hideTyping();

        if (res.ok) {
          const data = await res.json();
          addMessage(data.reply, 'bot');
        } else {
          addMessage('❌ เกิดข้อผิดพลาด กรุณาลองใหม่ครับ', 'bot');
        }
      } catch (err) {
        hideTyping();
        addMessage('❌ ไม่สามารถเชื่อมต่อ Server ได้ กรุณาตรวจสอบว่า Server กำลังทำงาน', 'bot');
      }

      isLoading = false;
      document.getElementById('sendBtn').disabled = false;
      input.focus();
    }

    function sendQuick(text) {
      document.getElementById('messageInput').value = text;
      sendMessage();
    }

    async function resetChat() {
      try {
        await fetch(RESET_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId }),
        });
      } catch {}

      const chatArea = document.getElementById('chatArea');
      chatArea.innerHTML = `
        <div class="welcome">
          <h2>🟡 ยินดีต้อนรับสู่ YBX Assistant</h2>
          <p>
            ผมคือผู้ช่วย AI ของ Yellow Box Markets<br>
            เชี่ยวชาญด้านกลยุทธ์ ENGULF-X<br><br>
            📊 วิเคราะห์ตลาด &nbsp;|&nbsp; 📚 สอนกลยุทธ์ &nbsp;|&nbsp; 💬 สนับสนุนลูกค้า<br><br>
            พิมพ์ข้อความหรือกดปุ่มด้านบนเพื่อเริ่มต้น!
          </p>
        </div>
      `;
    }

    function handleKeydown(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    function autoResize(el) {
      el.style.height = '42px';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }
  </script>
</body>
</html>
